<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)" stroke="#334155" stroke-width="4"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.3"/>

  <!-- Shield shape -->
  <path d="M256 80 L400 150 L400 280 C400 360 340 420 256 450 C172 420 112 360 112 280 L112 150 Z"
        fill="url(#shieldGrad)" opacity="0.9" filter="url(#shadow)"/>

  <!-- Shield inner highlight -->
  <path d="M256 100 L380 162 L380 278 C380 348 328 402 256 430 C184 402 132 348 132 278 L132 162 Z"
        fill="none" stroke="white" stroke-width="2" opacity="0.2"/>

  <!-- Lock body -->
  <rect x="210" y="260" width="92" height="80" rx="12" fill="url(#lockGrad)" filter="url(#glow)"/>

  <!-- Lock shackle -->
  <path d="M225 260 L225 220 C225 195 240 175 256 175 C272 175 287 195 287 220 L287 260"
        fill="none" stroke="#e2e8f0" stroke-width="14" stroke-linecap="round"/>

  <!-- Keyhole -->
  <circle cx="256" cy="295" r="12" fill="#1e293b"/>
  <rect x="252" y="295" width="8" height="20" rx="4" fill="#1e293b"/>

  <!-- Small decorative dots -->
  <circle cx="160" cy="200" r="4" fill="#3b82f6" opacity="0.5"/>
  <circle cx="352" cy="200" r="4" fill="#8b5cf6" opacity="0.5"/>
  <circle cx="256" cy="120" r="3" fill="#60a5fa" opacity="0.6"/>
</svg>
